name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Verify Java compatibility
        run: |
          set -euo pipefail
          java -version
          java -version 2>&1 | grep -E 'version "11\.' >/dev/null

      - name: Run tests
        run: sbt -v test
